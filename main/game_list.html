<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-LOG</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/image/pico_icon.jpg">
</head>
<body>
    <div id="container">  
      
            <img id="background" src="./image/background.png" alt="background"> 
            
            <div id="screen">
                <div id="gameList">
                    <div id="list_title">
                        <span >게임 리스트</span>
                    </div>
                    <div id="list_list">
                            <div id="flag" class="list_game game_check">
                                <div class="select">▶</div> 
                                <div class="list_text"><a href="">청기 백기</a></div>
                            </div>
                            <div id="memorizing" class="list_game">
                                <div class="select">▶</div> 
                                <div class="list_text"><a href="">암기 게임</a></div>
                            </div>
                            <div id="quiz" class="list_game">
                                <div class="select">▶</div> 
                                <div class="list_text"><a href="">퀴즈</a></div>
                            </div>
                            <div id="exit" class="list_game">
                                <div class="select">▶</div> 
                                <div class="list_text" style="color: red;"><a href="">나가기</a></div>
                            </div>
                    </div>
                </div>
            </div>
       
    </div>
    <script src="/index.js"></script>
</body>
