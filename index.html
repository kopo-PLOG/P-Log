<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-Log</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="common/controls_guide.css">
    <link rel="icon" href="./image/pico_icon.jpg"> <!--파비콘-->
</head>
<body>
    <div id="container">  
        <img id="background" src="./image/background.png" alt="background"> 
        
        <div id="screen">
            <div id="start-screen">
                <h1 id="title">P-LOG</h1>
                <button id="start-btn">게임시작</button>
                <p id="instruction">아래 방향키(↓)를 눌러 게임을 시작해주세요!</p>
            </div>
        </div>

        <div id="controls-guide">
            <h3>⭐ 조작 방법 ⭐</h3>
            <ul>
                <li><span class="key">←</span> 왼쪽 이동</li>
                <li><span class="key">→</span> 오른쪽 이동</li>
                <li><span class="key">↓</span> 선택</li>
            </ul>
        </div>
    </div>

    

    <script>
        function startGame() {
           window.location.href = "main/main.html";
        }

        
        document.getElementById('start-btn').addEventListener('click', function() {
            startGame(); //게임시작 클릭하면 index.html로 넘어가는 startGame함수 실행
        });
    </script>
</body>
</html>
