<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-LOG</title>
    <link rel="stylesheet" href="game_list.css">
    <link rel="icon" href="../image/pico_icon.jpg">
</head>
<body>
    <div id="container">  
      
        <img id="background" src="../image/background.png" alt="background"> 
        
        <div id="screen">
            <div id="gameList">
                <div id="list_title">
                    <span>🎮게임 리스트🎮</span>
                </div>
                <div id="list_list">
                    <div id="list_inner">
                        <div id="flag" class="list_game game_check">
                            <div class="select">▶</div> 
                            <div class="list_text"><span>청기 백기</span> </div>
                        </div>
                        <div id="memorizing" class="list_game">
                            <div class="select"></div> 
                            <div class="list_text"><span>암기 게임</span></div>
                        </div>
                        <div id="quiz" class="list_game">
                            <div class="select"></div> 
                            <div class="list_text"><span>퀴즈</span></div>
                        </div>
                        <div id="exit" class="list_game" style="color: red;">
                            <div class="select"></div> 
                            <div class="list_text" ><span>나가기</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="controls-guide">
            <div id="controls_title">
                <h3>⭐ 게임설명 ⭐</h3>
                <div></div>
            </div>
            <div id="controls_area">
                <div class="explanation">
                    <div><span style="color : rgb(255, 2, 2);">청기 백기</span></div>
                    <div>문제에 맞춰 청기와 백기를 들어보자!</div>
                    <div class="result">7라운드 이상 성공시 : level <span style="color: rgb(32, 167, 6);">+10</span> <br> 실패시 : level <span style="color: rgb(32, 167, 6);">-5</span></div>
                </div>
                <div class="explanation">
                    <div><span style="color : red">암기게임</span></div>
                    <div>방향키를 외워 문제를 맞춰보자!</div>
                    <div class="result">모든 라운드 성공시 : level <span style="color: rgb(32, 167, 6);">+20</span> <br> 실패시 : level <span style="color: rgb(32, 167, 6);">-5</span></div>
                </div>
                <div class="explanation">
                    <div><span style="color : red">퀴즈</span></div>
                    <div>문제에 정답을 맞춰보자!</div>
                    <div class="result">7개 문제 이상 성공시 : level <span style="color: rgb(32, 167, 6);">+10</span> <br> 실패시 : level <span style="color: rgb(32, 167, 6);">-5</span></div>
                </div>
            </div>
            
        </div>

        <div>
            <audio loop autoplay>
                <source src="../bgm/game_bgm3.wav" type="audio/mpeg">
                <source src="music.ogg" type="audio/ogg">
                브라우저에서 오디오를 지원하지 않습니다.
            </audio>
        </div>
    </div>
    <script src="./game_list.js"></script>
</body>
</html>
