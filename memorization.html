<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="memo.css">
</head>
<body>
    <div id="container">
        <img id="background" src="./image/background.png" alt="background">

        <div id="screen">
            
            <div class="memo-wrap">
                 <h2 class="game-title">방향 맞추기</h2>

                <div class="info-box">
                    <span>남은 문제: <span id="round"></span></span>  
                    <span>맞춘 개수: <span id="score"></span></span>
                </div>

                <img id="arrow-display" src="./image/삐코_암기게임.png">← →</div>

                <p class="guide">← 또는 → 를 누르세요</p>

                <button id="start-btn">게임 시작</button>

                <p id="result-message"></p>
            </div>
        </div>
    </div>
</body>
</html>
